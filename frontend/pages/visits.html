<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Visits — PropBot AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & BASE ───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Outfit', sans-serif;
  background: #080809;
  color: #e8e6e0;
  display: flex;
  height: 100vh;
}

:root {
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --green-border: rgba(34,197,94,0.25);
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --surface: #0e0e10;
  --surface2: #141416;
  --surface3: #1a1a1e;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #e8e6e0;
  --muted: #52525b;
  --muted2: #3f3f46;
  --mono: 'JetBrains Mono', monospace;
}

/* ── SIDEBAR ────────────────────────────────── */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.sidebar::before {
  content: '';
  position: absolute;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
  bottom: 60px; left: -40px;
  pointer-events: none;
}

.sb-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sb-logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #16a34a, #22c55e);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(34,197,94,0.25);
}

.sb-logo-text {
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
}

.sb-logo-sub {
  font-size: 0.6rem;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.5px;
}

.sb-nav { padding: 12px 10px; flex: 1; }

.sb-group-label {
  font-size: 0.58rem;
  font-family: var(--mono);
  color: var(--muted2);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 10px 4px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  margin: 1px 0;
  border-radius: 10px;
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.sb-item:hover { background: var(--surface2); color: #ccc; }

.sb-item.active {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid var(--green-border);
}

.sb-icon {
  width: 28px; height: 28px;
  background: var(--surface3);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  flex-shrink: 0;
  transition: background 0.15s;
}

.sb-item.active .sb-icon { background: rgba(34,197,94,0.15); }
.sb-item:hover .sb-icon  { background: var(--surface3); }

.sb-badge {
  margin-left: auto;
  background: var(--green);
  color: #000;
  font-size: 0.58rem;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 6px;
  border-radius: 100px;
  min-width: 18px;
  text-align: center;
}

.sb-bottom {
  padding: 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.sb-agent-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sb-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #16a34a, #22c55e);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.85rem;
  color: #fff;
  flex-shrink: 0;
}

.sb-agent-name { font-size: 0.8rem; font-weight: 600; color: #ddd; }
.sb-agent-plan { font-size: 0.62rem; color: var(--green); font-family: var(--mono); }

.sb-logout {
  width: 100%;
  margin-top: 8px;
  padding: 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}

.sb-logout:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: #ef4444; }

/* ── MAIN ───────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #080809;
}

/* ── TOPBAR ─────────────────────────────────── */
.topbar {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(8,8,9,0.95);
  backdrop-filter: blur(10px);
}

.topbar-left { }
.page-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.page-title-icon {
  width: 30px; height: 30px;
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
}

.page-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

.topbar-right { display: flex; align-items: center; gap: 10px; }

.ai-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  color: var(--green);
  font-size: 0.7rem;
  font-weight: 600;
  font-family: var(--mono);
  padding: 6px 12px;
  border-radius: 100px;
}

.ai-pill-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: glow 1.5s infinite;
}

@keyframes glow {
  0%,100% { opacity:1; box-shadow: 0 0 4px var(--green); }
  50% { opacity:0.5; box-shadow: none; }
}

.book-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--green);
  color: #000;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.84rem;
  padding: 8px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}

.book-btn:hover { background: #16a34a; color: #fff; transform: translateY(-1px); box-shadow: 0 0 30px rgba(34,197,94,0.3); }

/* ── STATS ROW ──────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.stat-cell {
  background: var(--surface);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
}

.stat-cell:hover { background: var(--surface2); }

.stat-cell::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.stat-cell.c-amber::after  { background: var(--amber); }
.stat-cell.c-green::after  { background: var(--green); }
.stat-cell.c-red::after    { background: var(--red); }
.stat-cell.c-purple::after { background: var(--purple); }

.stat-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.stat-cell.c-amber .stat-icon  { background: rgba(245,158,11,0.1); }
.stat-cell.c-green .stat-icon  { background: rgba(34,197,94,0.1); }
.stat-cell.c-red .stat-icon    { background: rgba(239,68,68,0.1); }
.stat-cell.c-purple .stat-icon { background: rgba(167,139,250,0.1); }

.stat-info { }
.stat-label { font-size: 0.65rem; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.stat-value { font-size: 1.9rem; font-weight: 800; font-family: var(--mono); line-height: 1; }

.stat-cell.c-amber .stat-value  { color: var(--amber); }
.stat-cell.c-green .stat-value  { color: var(--green); }
.stat-cell.c-red .stat-value    { color: var(--red); }
.stat-cell.c-purple .stat-value { color: var(--purple); }

/* ── FILTER BAR ─────────────────────────────── */
.filter-bar {
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  background: var(--surface);
}

.ftab {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ftab:hover { background: var(--surface2); color: #aaa; border-color: var(--border); }
.ftab.active { background: var(--green-dim); color: var(--green); border-color: var(--green-border); }

.ftab-count {
  background: var(--surface3);
  color: var(--muted);
  font-size: 0.6rem;
  font-family: var(--mono);
  padding: 1px 5px;
  border-radius: 4px;
}

.ftab.active .ftab-count { background: rgba(34,197,94,0.15); color: var(--green); }

/* ── VISITS AREA ────────────────────────────── */
.visits-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}

/* ── VISIT CARD ─────────────────────────────── */
.visit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 60px 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.2s;
  animation: cardIn 0.3s ease both;
  position: relative;
  overflow: hidden;
}

.visit-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.visit-card.s-pending::before   { background: var(--amber); }
.visit-card.s-confirmed::before { background: var(--green); }
.visit-card.s-done::before      { background: var(--purple); }
.visit-card.s-cancelled::before { background: var(--muted2); }

.visit-card:hover { background: var(--surface2); border-color: var(--border2); transform: translateX(3px); }
.visit-card.s-cancelled { opacity: 0.5; }

@keyframes cardIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }

/* DATE BOX */
.v-date-box {
  width: 52px; height: 52px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.v-day   { font-size: 1.4rem; font-weight: 800; font-family: var(--mono); line-height: 1; color: #fff; }
.v-month { font-size: 0.55rem; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

/* VISIT INFO */
.v-info { min-width: 0; }
.v-buyer { font-size: 0.92rem; font-weight: 600; color: #e5e5e5; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; }
.v-phone { font-size: 0.7rem; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
.v-prop  { font-size: 0.77rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }

.today-tag {
  font-size: 0.6rem;
  font-weight: 700;
  font-family: var(--mono);
  background: rgba(239,68,68,0.12);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.2);
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* TIME BADGE */
.v-time {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: #666;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* STATUS BADGE */
.v-status {
  font-size: 0.65rem;
  font-weight: 700;
  font-family: var(--mono);
  padding: 5px 10px;
  border-radius: 7px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.badge-pending   { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
.badge-confirmed { background: rgba(34,197,94,0.1);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.badge-done      { background: rgba(167,139,250,0.1);color: var(--purple);border: 1px solid rgba(167,139,250,0.2); }
.badge-cancelled { background: rgba(82,82,91,0.1);   color: var(--muted); border: 1px solid var(--border); }

/* ACTION BUTTONS */
.v-actions { display: flex; gap: 6px; flex-shrink: 0; }

.vbtn {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: #666;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.vbtn:hover { background: var(--surface3); color: #ccc; border-color: var(--border2); }
.vbtn.v-confirm { color: var(--green); border-color: var(--green-border); }
.vbtn.v-confirm:hover { background: var(--green); color: #000; border-color: var(--green); }
.vbtn.v-cancel:hover  { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.3); }
.vbtn.v-done:hover    { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.3); }

/* ── EMPTY STATE ────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  text-align: center;
}

.empty-glow {
  width: 80px; height: 80px;
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(34,197,94,0.1);
}

.empty-title { font-size: 1.1rem; font-weight: 700; color: #555; margin-bottom: 8px; }
.empty-sub   { font-size: 0.83rem; color: var(--muted2); line-height: 1.6; margin-bottom: 20px; }

/* ── LOADING STATE ──────────────────────────── */
.loading-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4rem;
  color: var(--muted);
  font-size: 0.85rem;
}

/* ── MODAL ──────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.overlay.open { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  overflow: hidden;
  animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
}

@keyframes modalIn { from{opacity:0;transform:scale(0.92)translateY(12px)}to{opacity:1;transform:scale(1)translateY(0)} }

.modal-hdr {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title { font-size: 1rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
.modal-title-icon { font-size: 1.1rem; }

.modal-close {
  width: 30px; height: 30px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}

.modal-close:hover { background: var(--surface3); color: #fff; }

.modal-body { padding: 20px 24px; max-height: 65vh; overflow-y: auto; }
.modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

.fg { margin-bottom: 14px; }

.fg label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.fg input, .fg select, .fg textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  font-size: 0.85rem;
  font-family: 'Outfit', sans-serif;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.08);
}

.fg select option { background: var(--surface); }
.fg textarea { resize: vertical; min-height: 70px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.mbtn {
  padding: 9px 20px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.mbtn.cancel { background: var(--surface2); color: #666; border: 1px solid var(--border); }
.mbtn.cancel:hover { background: var(--surface3); color: #aaa; }
.mbtn.save { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(34,197,94,0.2); }
.mbtn.save:hover { background: #16a34a; color: #fff; box-shadow: 0 0 30px rgba(34,197,94,0.3); }
.mbtn:disabled { background: var(--surface3); color: var(--muted2); cursor: not-allowed; box-shadow: none; }

.msg-bar {
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 0.8rem;
  margin-bottom: 14px;
  display: none;
  font-weight: 500;
}

.msg-bar.error   { background: rgba(239,68,68,0.08); color: var(--red); border: 1px solid rgba(239,68,68,0.15); display: block; }
.msg-bar.success { background: rgba(34,197,94,0.08); color: var(--green); border: 1px solid rgba(34,197,94,0.15); display: block; }

/* ── DETAIL PANEL ───────────────────────────── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  justify-content: flex-end;
}

.detail-overlay.open { display: flex; }

.detail-panel {
  width: 400px;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  animation: panelIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  box-shadow: -20px 0 60px rgba(0,0,0,0.4);
}

@keyframes panelIn { from{transform:translateX(100%)}to{transform:translateX(0)} }

.detail-hdr {
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

.detail-hdr-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
.detail-hdr-sub   { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }

.detail-body { flex: 1; padding: 20px 22px; overflow-y: auto; }
.detail-foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 0.6rem; font-family: var(--mono); color: var(--muted2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.detail-row:last-child { border-bottom: none; }
.d-key   { font-size: 0.76rem; color: var(--muted); }
.d-value { font-size: 0.82rem; font-weight: 500; color: #ddd; text-align: right; max-width: 60%; }

.detail-notes {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 0.82rem;
  color: #888;
  line-height: 1.6;
  font-style: italic;
}

/* ── SCROLLBAR ──────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }

/* ── SPINNER ────────────────────────────────── */
.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: sp 0.7s linear infinite;
  display: inline-block;
}
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════════ -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">🤖</div>
    <div>
      <div class="sb-logo-text">PropBot AI</div>
      <div class="sb-logo-sub">AGENT PORTAL</div>
    </div>
  </div>

  <div class="sb-nav">
    <div class="sb-group-label">Main</div>
    <div class="sb-item" onclick="location.href='/dashboard'">
      <div class="sb-icon">⚡</div> Dashboard
    </div>
    <div class="sb-item" onclick="location.href='/dashboard'">
      <div class="sb-icon">👥</div> Leads
    </div>
    <div class="sb-item active">
      <div class="sb-icon">📅</div>
      Site Visits
      <span class="sb-badge" id="pending-badge">0</span>
    </div>

    <div class="sb-group-label">Manage</div>
    <div class="sb-item" onclick="location.href='/properties'">
      <div class="sb-icon">🏠</div> Properties
    </div>
    <div class="sb-item">
      <div class="sb-icon">🔁</div> Follow-ups
    </div>

    <div class="sb-group-label">Account</div>
    <div class="sb-item">
      <div class="sb-icon">⚙️</div> Settings
    </div>
    <div class="sb-item">
      <div class="sb-icon">💳</div> Billing
    </div>
  </div>

  <div class="sb-bottom">
    <div class="sb-agent-card">
      <div class="sb-avatar" id="sb-avatar">?</div>
      <div>
        <div class="sb-agent-name" id="sb-name">Loading...</div>
        <div class="sb-agent-plan" id="sb-plan">PRO</div>
      </div>
    </div>
    <button class="sb-logout" onclick="logout()">↩ Sign Out</button>
  </div>
</div>

<!-- ══ MAIN ════════════════════════════════════ -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title">
        <div class="page-title-icon">📅</div>
        Site Visits
      </div>
      <div class="page-sub" id="top-date">Loading...</div>
    </div>
    <div class="topbar-right">
      <div class="ai-pill"><div class="ai-pill-dot"></div>AI Agent Online</div>
      <button class="book-btn" onclick="openModal()">+ Book Visit</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-cell c-amber">
      <div class="stat-icon">⏳</div>
      <div class="stat-info">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="s-pending">—</div>
      </div>
    </div>
    <div class="stat-cell c-green">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <div class="stat-label">Confirmed</div>
        <div class="stat-value" id="s-confirmed">—</div>
      </div>
    </div>
    <div class="stat-cell c-red">
      <div class="stat-icon">🔥</div>
      <div class="stat-info">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="s-today">—</div>
      </div>
    </div>
    <div class="stat-cell c-purple">
      <div class="stat-icon">🏆</div>
      <div class="stat-info">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="s-done">—</div>
      </div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="ftab active" onclick="filterVisits('all',this)">All <span class="ftab-count" id="fc-all">0</span></button>
    <button class="ftab" onclick="filterVisits('pending',this)">⏳ Pending <span class="ftab-count" id="fc-pending">0</span></button>
    <button class="ftab" onclick="filterVisits('confirmed',this)">✅ Confirmed <span class="ftab-count" id="fc-confirmed">0</span></button>
    <button class="ftab" onclick="filterVisits('today',this)">🔥 Today <span class="ftab-count" id="fc-today">0</span></button>
    <button class="ftab" onclick="filterVisits('done',this)">🏆 Done <span class="ftab-count" id="fc-done">0</span></button>
    <button class="ftab" onclick="filterVisits('cancelled',this)">❌ Cancelled <span class="ftab-count" id="fc-cancelled">0</span></button>
  </div>

  <!-- VISITS LIST -->
  <div class="visits-area" id="visits-area">
    <div class="loading-wrap"><div class="spin"></div> Loading visits...</div>
  </div>

</div>

<!-- ══ BOOK VISIT MODAL ══════════════════════════ -->
<div class="overlay" id="modal" onclick="overlayClick(event,'modal')">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title"><span class="modal-title-icon">📅</span><span id="modal-title-text">Book Site Visit</span></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="msg-bar" id="modal-msg"></div>
      <div class="fg-row">
        <div class="fg">
          <label>Buyer Name</label>
          <input type="text" id="v-name" placeholder="Suresh Patil">
        </div>
        <div class="fg">
          <label>Buyer Phone</label>
          <input type="tel" id="v-phone" placeholder="+91 98765 43210">
        </div>
      </div>
      <div class="fg">
        <label>Property</label>
        <select id="v-property"><option value="">Select property...</option></select>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Visit Date</label>
          <input type="date" id="v-date">
        </div>
        <div class="fg">
          <label>Visit Time</label>
          <select id="v-time">
            <option value="09:00">9:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00" selected>11:00 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="14:00">2:00 PM</option>
            <option value="15:00">3:00 PM</option>
            <option value="16:00">4:00 PM</option>
            <option value="17:00">5:00 PM</option>
            <option value="18:00">6:00 PM</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Notes (optional)</label>
        <textarea id="v-notes" placeholder="Buyer wants east facing, needs parking..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" id="save-btn" onclick="saveVisit()">📅 Book Visit</button>
    </div>
  </div>
</div>

<!-- ══ DETAIL PANEL ══════════════════════════════ -->
<div class="detail-overlay" id="detail-overlay" onclick="overlayClick(event,'detail-overlay')">
  <div class="detail-panel">
    <div class="detail-hdr">
      <div>
        <div class="detail-hdr-title" id="d-title">Visit Details</div>
        <div class="detail-hdr-sub" id="d-sub">—</div>
      </div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="detail-foot" id="detail-foot"></div>
  </div>
</div>

<!-- ══ SCRIPTS ══════════════════════════════════ -->
<script src="/frontend/js/app.js"></script>
<script>
// ── INIT ──────────────────────────────────────
let allVisits = [];
let currentFilter = 'all';
let editingId = null;

const { createClient } = supabase;
const db = createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

initApp().then(async () => {
  if (!currentAgent) return;

  // Sidebar agent info
  const initials = (currentAgent.name || currentAgent.email || 'A')
    .split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sb-avatar').textContent = initials;
  document.getElementById('sb-name').textContent   = currentAgent.name || currentAgent.email;
  document.getElementById('sb-plan').textContent   = `${(currentAgent.plan||'PRO').toUpperCase()} · ${currentAgent.city||''}`;

  // Date
  document.getElementById('top-date').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Default date = tomorrow
  const tom = new Date();
  tom.setDate(tom.getDate() + 1);
  document.getElementById('v-date').value = tom.toISOString().split('T')[0];

  await Promise.all([loadVisits(), loadProps()]);
});

// ── LOAD VISITS ───────────────────────────────
async function loadVisits() {
  try {
    const { data, error } = await db
      .from('visits')
      .select('*')
      .eq('agent_id', currentAgent.id)
      .order('scheduled_at', { ascending: true });

    if (error) throw error;
    allVisits = data || [];
    updateStats();
    updateTabCounts();
    render(currentFilter);
  } catch(e) {
    document.getElementById('visits-area').innerHTML =
      `<div class="empty-state"><div class="empty-glow">⚠️</div><div class="empty-title">Error loading visits</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── LOAD PROPERTIES FOR DROPDOWN ─────────────
async function loadProps() {
  try {
    const { data } = await db
      .from('properties')
      .select('id,bhk,location,city,price')
      .eq('agent_id', currentAgent.id)
      .eq('status', 'available');

    const sel = document.getElementById('v-property');
    sel.innerHTML = '<option value="">Select property...</option>';
    (data || []).forEach(p => {
      const o = document.createElement('option');
      o.value = o.textContent = `${p.bhk} — ${p.location}${p.city?', '+p.city:''} (₹${p.price}L)`;
      sel.appendChild(o);
    });
  } catch(e) { console.error('Props error:', e.message); }
}

// ── STATS ─────────────────────────────────────
function updateStats() {
  const tod = new Date().toDateString();
  const pending   = allVisits.filter(v => v.status === 'pending').length;
  const confirmed = allVisits.filter(v => v.status === 'confirmed').length;
  const done      = allVisits.filter(v => v.status === 'done').length;
  const today     = allVisits.filter(v => v.scheduled_at && new Date(v.scheduled_at).toDateString() === tod).length;

  document.getElementById('s-pending').textContent   = pending;
  document.getElementById('s-confirmed').textContent = confirmed;
  document.getElementById('s-today').textContent     = today;
  document.getElementById('s-done').textContent      = done;
  document.getElementById('pending-badge').textContent = pending;
}

// ── TAB COUNTS ────────────────────────────────
function updateTabCounts() {
  const tod = new Date().toDateString();
  document.getElementById('fc-all').textContent       = allVisits.length;
  document.getElementById('fc-pending').textContent   = allVisits.filter(v => v.status === 'pending').length;
  document.getElementById('fc-confirmed').textContent = allVisits.filter(v => v.status === 'confirmed').length;
  document.getElementById('fc-today').textContent     = allVisits.filter(v => v.scheduled_at && new Date(v.scheduled_at).toDateString() === tod).length;
  document.getElementById('fc-done').textContent      = allVisits.filter(v => v.status === 'done').length;
  document.getElementById('fc-cancelled').textContent = allVisits.filter(v => v.status === 'cancelled').length;
}

// ── FILTER ────────────────────────────────────
function filterVisits(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render(f);
}

// ── RENDER ────────────────────────────────────
function render(filter) {
  const area = document.getElementById('visits-area');
  const tod  = new Date().toDateString();

  let list = [...allVisits];
  if (filter === 'pending')   list = list.filter(v => v.status === 'pending');
  if (filter === 'confirmed') list = list.filter(v => v.status === 'confirmed');
  if (filter === 'done')      list = list.filter(v => v.status === 'done');
  if (filter === 'cancelled') list = list.filter(v => v.status === 'cancelled');
  if (filter === 'today')     list = list.filter(v => v.scheduled_at && new Date(v.scheduled_at).toDateString() === tod);

  if (!list.length) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-glow">📅</div>
        <div class="empty-title">No visits ${filter === 'all' ? 'yet' : 'in this category'}</div>
        <div class="empty-sub">${filter === 'all' ? 'Book your first visit or let the AI agent book automatically when buyers request.' : `No ${filter} visits right now.`}</div>
        ${filter === 'all' ? `<button class="book-btn" onclick="openModal()" style="margin-top:0;">+ Book First Visit</button>` : ''}
      </div>`;
    return;
  }

  area.innerHTML = list.map((v, i) => {
    const dt      = v.scheduled_at ? new Date(v.scheduled_at) : null;
    const dayNum  = dt ? dt.getDate() : '?';
    const monStr  = dt ? dt.toLocaleString('en-IN', { month:'short' }).toUpperCase() : '';
    const timeStr = dt ? dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : '?';
    const isToday = dt && dt.toDateString() === tod;

    return `
    <div class="visit-card s-${v.status||'pending'}" onclick="openDetail('${v.id}')" style="animation-delay:${i*0.05}s">
      <div class="v-date-box">
        <div class="v-day">${dayNum}</div>
        <div class="v-month">${monStr}</div>
      </div>
      <div class="v-info">
        <div class="v-buyer">
          ${v.buyer_name || 'Unknown Buyer'}
          ${isToday ? '<span class="today-tag">TODAY</span>' : ''}
        </div>
        <div class="v-phone">${v.buyer_phone || '—'}</div>
        <div class="v-prop">🏠 ${v.property || 'Property not specified'}</div>
      </div>
      <div class="v-time">⏰ ${timeStr}</div>
      <div class="v-status badge-${v.status||'pending'}">${statusLabel(v.status)}</div>
      <div class="v-actions" onclick="event.stopPropagation()">
        ${actionBtns(v)}
      </div>
    </div>`;
  }).join('');
}

// ── ACTION BUTTONS ────────────────────────────
function actionBtns(v) {
  if (v.status === 'pending') return `
    <button class="vbtn v-confirm" onclick="setStatus('${v.id}','confirmed')">✅ Confirm</button>
    <button class="vbtn v-cancel"  onclick="setStatus('${v.id}','cancelled')">✗</button>`;
  if (v.status === 'confirmed') return `
    <button class="vbtn v-done"   onclick="setStatus('${v.id}','done')">🏆 Done</button>
    <button class="vbtn v-cancel" onclick="setStatus('${v.id}','cancelled')">✗</button>`;
  if (v.status === 'done') return `
    <button class="vbtn" onclick="editVisit('${v.id}');event.stopPropagation()">✏️</button>`;
  if (v.status === 'cancelled') return `
    <button class="vbtn v-confirm" onclick="setStatus('${v.id}','pending')">↩ Reopen</button>`;
  return '';
}

// ── STATUS UPDATE ─────────────────────────────
async function setStatus(id, status) {
  try {
    const { error } = await db.from('visits').update({ status }).eq('id', id);
    if (error) throw error;
    await loadVisits();
    closeDetail();
  } catch(e) { alert(e.message); }
}

// ── OPEN DETAIL PANEL ─────────────────────────
function openDetail(id) {
  const v  = allVisits.find(x => x.id === id);
  if (!v) return;

  const dt      = v.scheduled_at ? new Date(v.scheduled_at) : null;
  const dateStr = dt ? dt.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) : '—';
  const timeStr = dt ? dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : '—';

  document.getElementById('d-title').textContent = v.buyer_name || 'Visit Details';
  document.getElementById('d-sub').textContent   = `${statusLabel(v.status)} · ${v.property || ''}`;

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Buyer Info</div>
      <div class="detail-row"><span class="d-key">Name</span><span class="d-value">${v.buyer_name||'—'}</span></div>
      <div class="detail-row"><span class="d-key">Phone</span><span class="d-value">${v.buyer_phone||'—'}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Visit Info</div>
      <div class="detail-row"><span class="d-key">Property</span><span class="d-value">${v.property||'—'}</span></div>
      <div class="detail-row"><span class="d-key">Date</span><span class="d-value">${dateStr}</span></div>
      <div class="detail-row"><span class="d-key">Time</span><span class="d-value">${timeStr}</span></div>
      <div class="detail-row"><span class="d-key">Status</span><span class="d-value">${statusLabel(v.status)}</span></div>
      <div class="detail-row"><span class="d-key">Booked By</span><span class="d-value">${v.booked_by||'Agent'}</span></div>
    </div>
    ${v.notes ? `<div class="detail-section"><div class="detail-section-title">Notes</div><div class="detail-notes">${v.notes}</div></div>` : ''}
  `;

  document.getElementById('detail-foot').innerHTML = actionBtns(v).replace(/onclick="/g, `onclick="`) +
    `<button class="mbtn cancel" onclick="editVisit('${v.id}');closeDetail()">✏️ Edit</button>
     <button class="mbtn cancel" onclick="closeDetail()">Close</button>`;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

// ── SAVE VISIT ────────────────────────────────
async function saveVisit() {
  const name     = document.getElementById('v-name').value.trim();
  const phone    = document.getElementById('v-phone').value.trim();
  const property = document.getElementById('v-property').value;
  const date     = document.getElementById('v-date').value;
  const time     = document.getElementById('v-time').value;
  const notes    = document.getElementById('v-notes').value.trim();

  if (!name)     return showMsg('Please enter buyer name', 'error');
  if (!phone)    return showMsg('Please enter buyer phone', 'error');
  if (!property) return showMsg('Please select a property', 'error');
  if (!date)     return showMsg('Please select visit date', 'error');

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Saving...';

  const payload = {
    agent_id:     currentAgent.id,
    buyer_name:   name,
    buyer_phone:  phone,
    property,
    scheduled_at: new Date(`${date}T${time}:00`).toISOString(),
    status:       'pending',
    notes:        notes || null,
    booked_by:    'agent'
  };

  try {
    if (editingId) {
      const { error } = await db.from('visits').update(payload).eq('id', editingId);
      if (error) throw error;
      showMsg('✅ Visit updated!', 'success');
    } else {
      const { error } = await db.from('visits').insert([payload]);
      if (error) throw error;
      showMsg('✅ Visit booked successfully!', 'success');
    }
    await loadVisits();
    setTimeout(closeModal, 1000);
  } catch(e) { showMsg(e.message, 'error'); }

  btn.disabled = false;
  btn.textContent = '📅 Book Visit';
}

// ── EDIT ──────────────────────────────────────
function editVisit(id) {
  const v = allVisits.find(x => x.id === id);
  if (!v) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'Edit Visit';
  document.getElementById('v-name').value     = v.buyer_name  || '';
  document.getElementById('v-phone').value    = v.buyer_phone || '';
  document.getElementById('v-property').value = v.property    || '';
  document.getElementById('v-notes').value    = v.notes       || '';
  if (v.scheduled_at) {
    const d = new Date(v.scheduled_at);
    document.getElementById('v-date').value = d.toISOString().split('T')[0];
    document.getElementById('v-time').value = d.toTimeString().slice(0,5);
  }
  document.getElementById('modal').classList.add('open');
}

// ── MODAL HELPERS ─────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'Book Site Visit';
  clearForm();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
  clearForm();
}

function overlayClick(e, id) {
  if (e.target === document.getElementById(id)) {
    if (id === 'modal') closeModal();
    else closeDetail();
  }
}

function clearForm() {
  ['v-name','v-phone','v-notes'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('v-property').value = '';
  document.getElementById('v-time').value     = '11:00';
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  document.getElementById('v-date').value = tom.toISOString().split('T')[0];
  showMsg('','');
}

function showMsg(msg, type) {
  const el = document.getElementById('modal-msg');
  el.textContent = msg;
  el.className = `msg-bar ${type}`;
}

// ── HELPERS ───────────────────────────────────
function statusLabel(s) {
  return {pending:'⏳ Pending', confirmed:'✅ Confirmed', done:'🏆 Done', cancelled:'❌ Cancelled'}[s] || s;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
});
</script>
</body>
</html>
