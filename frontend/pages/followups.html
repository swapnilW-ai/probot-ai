<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow-Ups — PropBot AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/frontend/styles/app.css"/>
<link rel="stylesheet" href="/frontend/styles/followups.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo"><div class="sb-dot"></div>PropBot AI</div>
    <div class="sb-section">Main</div>
    <div class="sb-item active" onclick="location.href='/portal'">⚡ Dashboard <span class="sb-badge" id="hot-badge">0</span></div>
    <div class="sb-item">💬 Conversations</div>
    <div class="sb-item">👥 All Leads</div>
    <div class="sb-section">Manage</div>
    <div class="sb-item" onclick="location.href='/properties'">🏠 My Properties</div>
    <div class="sb-item" onclick="location.href='/visits'">📅 Site Visits</div>
    <div class="sb-item" onclick="location.href='/followups'">🔁 Follow-ups</div>
    <div class="sb-section">Account</div>
    <div class="sb-item">⚙️ Settings</div>
    <div class="sb-item" onclick="location.href='/billing'">💳 Billing</div>
    <div class="sb-bottom">
      <div class="sb-agent">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div>
          <div class="sb-name" id="sb-name">Loading...</div>
          <div class="sb-plan" id="sb-plan">PRO · Trial</div>
        </div>
      </div>
      <button class="sb-logout" onclick="logout()">↩ Logout</button>
    </div>
  </div>
<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="page-title">
        <div class="title-icon">🔁</div>
        Follow-Up Engine
      </div>
      <div class="page-sub" id="top-date"></div>
    </div>
    <div class="topbar-actions">
      <div class="ai-status-pill">
        <span class="ai-dot"></span> AI Engine Active
      </div>
      <button class="primary-btn" onclick="openAddModal()">+ Add Follow-Up</button>
    </div>
  </div>

  <!-- STATS -->

<div class="stats-grid">

  <div class="stat-card">

    <div class="stat-label">
      Due Today
    </div>

    <div
      class="stat-value"
      id="s-due"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      Upcoming
    </div>

    <div
      class="stat-value"
      id="s-upcoming"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      Completed
    </div>

    <div
      class="stat-value"
      id="s-done"
    >
      0
    </div>

  </div>

  <div class="stat-card">

    <div class="stat-label">
      AI Generated
    </div>

    <div
      class="stat-value"
      id="s-ai"
    >
      0
    </div>

  </div>

</div>

<!-- REMINDER -->

<div
  class="reminder-banner"
  id="reminder-banner"
  style="display:none;"
>

  <div id="reminder-text">
  </div>

  <div
    class="due-badge"
    id="due-badge"
  >
    0
  </div>

</div>

<!-- TABS -->

<div class="tabs">

  <button
    class="tab active"
    onclick="setTab('today', this)"
  >
    Today
    <span id="tc-today">0</span>
  </button>

  <button
    class="tab"
    onclick="setTab('upcoming', this)"
  >
    Upcoming
    <span id="tc-upcoming">0</span>
  </button>

  <button
    class="tab" onclick="setTab('all', this)"  >
    All <span id="tc-all">0</span>
  </button>

  <button class="tab" onclick="setTab('ai', this)"  >
    AI <span id="tc-ai">0</span>
  </button>

  <button class="tab" onclick="setTab('done', this)" >
    Done <span id="tc-done">0</span>
  </button>

  <button class="tab" onclick="setTab('missed', this)" >
    Missed <span id="tc-missed">0</span>
  </button>

</div>


  <!-- FOLLOWUP LIST -->
  <div class="fu-area" id="fu-area">
    <div class="loading-wrap"><div class="spin"></div> Loading follow-ups...</div>
  </div>

</div>

<!-- ══ ADD FOLLOW-UP MODAL ══ -->
<div class="overlay" id="add-modal" onclick="overlayClick(event,'add-modal')">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">
        <span>🔁</span>
        <span id="modal-title-txt">Add Follow-Up</span>
      </div>
      <button class="modal-x" onclick="closeModal('add-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="msg-bar" id="modal-msg"></div>

      <!-- LEAD SELECTOR -->
      <div class="fg">
        <label>Lead / Buyer</label>
        <select id="f-lead">
          <option value="">Select lead...</option>
        </select>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>Follow-Up Date</label>
          <input type="date" id="f-date">
        </div>
        <div class="fg">
          <label>Time</label>
          <select id="f-time">
            <option value="08:00">8:00 AM</option>
            <option value="09:00">9:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00" selected>11:00 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="14:00">2:00 PM</option>
            <option value="16:00">4:00 PM</option>
            <option value="18:00">6:00 PM</option>
            <option value="19:00">7:00 PM</option>
          </select>
        </div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>Type</label>
          <select id="f-type">
            <option>Call Back</option>
            <option>Site Visit</option>
            <option>Price Negotiation</option>
            <option>Payment Reminder</option>
            <option>Send Brochure</option>
            <option>General Follow-Up</option>
          </select>
        </div>
        <div class="fg">
          <label>Priority</label>
          <select id="f-priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label>Notes</label>
        <textarea id="f-note" placeholder="What to discuss, buyer preferences, key points..."></textarea>
      </div>

    </div>
    <div class="modal-foot">
      <button class="mbtn ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="mbtn ai-btn" onclick="getAISuggestion()">🤖 AI Suggest</button>
      <button class="mbtn primary" id="save-btn" onclick="saveFollowup()">💾 Save</button>
    </div>
  </div>
</div>

<script src="/frontend/js/app.js"></script>
<script src="/frontend/js/followups.js"></script>
</body>
</html>
