<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Agent Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f4ef;
  --black:#0f0f0f;
  --green:#22c55e;
  --border:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

.logo{
  font-weight:700;
  margin-bottom:20px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav div{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.nav div:hover{
  background:#111;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
  overflow:auto;
}

/* TOP */
.title{
  font-size:20px;
  font-weight:600;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:18px;
  border:1px solid var(--border);
}

.stat{
  font-size:26px;
  font-weight:700;
  margin-top:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:20px;
}

/* LEADS */
.leads{
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  overflow:hidden;
}

.leads-header{
  padding:15px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.table{
  max-height:350px;
  overflow:auto;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  padding:12px 15px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

/* CHAT */
.chat{
  background:#fff;
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.chat-box{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  margin:8px 0;
  font-size:14px;
}

.user{text-align:right}
.ai{text-align:left}

.chat-input{
  display:flex;
  border-top:1px solid var(--border);
}

.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.chat-input button{
  width:70px;
  background:var(--green);
  border:none;
  color:#fff;
  cursor:pointer;
}

/* LOADER */
.spin{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">AI Agent</div>

    <div class="nav">
      <div onclick="location.href='/dashboard'">Dashboard</div>
      <div onclick="location.href='/properties'">Properties</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>

  <div id="agent-email"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="title">Dashboard</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><div>Total Leads</div><div class="stat" id="s-total">0</div></div>
  <div class="card"><div>Hot Leads</div><div class="stat" id="s-hot">0</div></div>
  <div class="card"><div>Today</div><div class="stat" id="s-today">0</div></div>
  <div class="card"><div>AI Replies</div><div class="stat" id="s-replies">0</div></div>
</div>

<div class="grid">

<!-- LEADS -->
<div class="leads">
  <div class="leads-header">Live Leads</div>
  <div class="table" id="leads"></div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="chat-header">AI Assistant</div>

  <div class="chat-box" id="chat"></div>

  <div class="chat-input">
    <input id="msg" placeholder="Type message..." />
    <button id="btn" onclick="sendMsg()">Send</button>
  </div>
</div>

</div>

</div>

<script>
const db = supabase.createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let user;
let replies = 0;

// INIT
(async () => {
  const { data:{session} } = await db.auth.getSession();

  if(!session){
    location.href = "/portal"; // ✅ FIXED
    return;
  }

  user = session.user;
  document.getElementById("agent-email").innerText = user.email;

  loadLeads();
})();

// LOGOUT
async function logout(){
  await db.auth.signOut();
  location.href = "/";
}

// LOAD LEADS
async function loadLeads(){
  const { data } = await db
    .from("leads")
    .select("*")
    .eq("agent_id", user.id);

  document.getElementById("leads").innerHTML =
    data.map(l=>`
      <div class="row">
        <div>${l.name || 'Buyer'}</div>
        <div>${l.bhk || '-'}</div>
        <div>₹${l.budget_max || '-'}</div>
        <div>${l.location || '-'}</div>
      </div>
    `).join("");

  document.getElementById("s-total").innerText = data.length;
  document.getElementById("s-hot").innerText =
    data.filter(l=>l.score==="hot").length;

  document.getElementById("s-today").innerText = data.length;
}

// CHAT
function addMsg(text, cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.innerText=text;

  const c=document.getElementById("chat");
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

// AI LOGIC
function extractIntent(t){
  t=t.toLowerCase();
  return {
    bhk: t.includes("2")?"2BHK":null,
    budget_max: t.match(/\d+/)?.[0]
  }
}

async function getProps(f){
  let q=db.from("properties").select("*").eq("agent_id", user.id);
  if(f.bhk) q=q.eq("bhk",f.bhk);
  if(f.budget_max) q=q.lte("price",f.budget_max);

  const { data }=await q.limit(3);
  return data||[];
}

// SEND
async function sendMsg(){
  const input=document.getElementById("msg");
  const btn=document.getElementById("btn");

  const text=input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div>';

  const intent=extractIntent(text);
  const props=await getProps(intent);

  let reply="No matching properties";
  if(props.length){
    reply=props.map(p=>`${p.bhk} ₹${p.price}`).join("\n");
  }

  setTimeout(()=>addMsg(reply,"ai"),600);

  await db.from("leads").insert([{
    agent_id:user.id,
    bhk:intent.bhk,
    budget_max:intent.budget_max
  }]);

  replies++;
  document.getElementById("s-replies").innerText=replies;

  loadLeads();

  btn.disabled=false;
  btn.innerHTML="Send";
}
</script>

</body>
</html>
