<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f6f7fb;
  --card:#ffffff;
  --black:#111;
  --green:#22c55e;
  --border:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:#111;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}
.logo{font-weight:700;font-size:18px;margin-bottom:20px;}
.nav-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.nav-item:hover{background:#222}

/* Main */
.main{
  flex:1;
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
  overflow:auto;
}

/* Top */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.title{font-size:20px;font-weight:600}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  border:1px solid var(--border);
}
.stat{font-size:22px;font-weight:700}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:20px;
}

/* Leads */
.leads{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  max-height:400px;
  overflow:auto;
}
.lead{
  padding:10px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

/* Chat */
.chat{
  background:var(--card);
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.chat-box{
  flex:1;
  padding:10px;
  overflow:auto;
}
.msg{margin:6px 0;font-size:14px;}
.user{text-align:right}
.ai{text-align:left}

.chat-input{
  display:flex;
  border-top:1px solid var(--border);
}
.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}
.chat-input button{
  width:60px;
  border:none;
  background:var(--green);
  color:#fff;
  cursor:pointer;
}

/* Loader */
.spin{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">AI Agent</div>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item" onclick="logout()">Logout</div>
  </div>
  <div id="agent"></div>
</div>

<div class="main">

<div class="top">
  <div class="title">Dashboard</div>
</div>

<div class="stats">
  <div class="card"><div>Total Leads</div><div class="stat" id="total">0</div></div>
  <div class="card"><div>Hot Leads</div><div class="stat" id="hot">0</div></div>
  <div class="card"><div>Today</div><div class="stat" id="today">0</div></div>
</div>

<div class="grid">

<!-- Leads -->
<div class="leads" id="leads"></div>

<!-- Chat -->
<div class="chat">
  <div class="chat-box" id="chat"></div>
  <div class="chat-input">
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMsg()" id="btn">Send</button>
  </div>
</div>

</div>
</div>

<script>
const db = supabase.createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let user;

(async ()=>{
  const { data:{session} } = await db.auth.getSession();
  if(!session){ location.href="/agent-portal.html"; return; }
  user = session.user;

  document.getElementById("agent").innerText = user.email;

  loadLeads();
})();

async function logout(){
  await db.auth.signOut();
  location.href="/";
}

async function loadLeads(){
  const { data } = await db.from("leads").select("*").eq("agent_id", user.id);

  document.getElementById("leads").innerHTML = data.map(l=>`
    <div class="lead">${l.name} • ${l.bhk} • ₹${l.budget_max}</div>
  `).join("");

  document.getElementById("total").innerText = data.length;
  document.getElementById("hot").innerText = data.filter(l=>l.score==="hot").length;
  document.getElementById("today").innerText = data.length;
}

function extractIntent(t){
  t=t.toLowerCase();
  return {
    bhk: t.includes("2")?"2BHK":null,
    budget_max: t.match(/\d+/)?.[0],
    location: t.includes("nashik")?"Nashik":null
  }
}

async function getProps(f){
  let q=db.from("properties").select("*").eq("agent_id", user.id);
  if(f.bhk) q=q.eq("bhk",f.bhk);
  if(f.budget_max) q=q.lte("price",f.budget_max);
  const { data }=await q.limit(3);
  return data||[];
}

function addMsg(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.innerText=t;
  const chat=document.getElementById("chat");
  chat.appendChild(d);
  chat.scrollTo({top:chat.scrollHeight,behavior:"smooth"});
}

async function sendMsg(){
  const i=document.getElementById("msg");
  const btn=document.getElementById("btn");

  const text=i.value.trim();
  if(!text)return;

  addMsg(text,"user");
  i.value="";

  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div>';

  const intent=extractIntent(text);
  const props=await getProps(intent);

  let reply="No match";
  if(props.length){
    reply=props.map(p=>`${p.bhk} ₹${p.price}`).join("\n");
  }

  setTimeout(()=>addMsg(reply,"ai"),600);

  await db.from("leads").insert([{
    agent_id:user.id,
    bhk:intent.bhk,
    budget_max:intent.budget_max,
    location:intent.location
  }]);

  loadLeads();

  btn.disabled=false;
  btn.innerHTML="Send";
}
</script>

</body>
</html>
<style>
body { font-family: Arial; margin:0; display:flex; }
.sidebar { width:200px; background:#111; color:#fff; padding:15px; }
.main { flex:1; padding:20px; }
button { padding:8px 12px; cursor:pointer; }
.chat { border:1px solid #ddd; padding:10px; height:300px; overflow:auto; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Agent</h3>
  <div id="agent-name">...</div>
  <br>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <h2>Dashboard</h2>

  <h3>Properties</h3>
  <div id="prop-list"></div>

  <h3>AI Chat</h3>
  <div class="chat" id="chat"></div>
  <input id="msg" placeholder="Type..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>

// ── SUPABASE ──
const { createClient } = supabase;
const db = createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let currentUser = null;
let properties = [];

// ── INIT ──
(async () => {

  const { data: { session } } = await db.auth.getSession();

  if (!session) {
    window.location.href = "/agent-portal.html";
    return;
  }

  currentUser = session.user;

  // load profile
  const { data: profile } = await db
    .from('agents')
    .select('*')
    .eq('id', currentUser.id)
    .single();

  document.getElementById('agent-name').innerText =
    profile?.name || "Agent";

  await loadProperties();

})();

// ── LOGOUT ──
async function logout() {
  await db.auth.signOut();
  window.location.href = "/";
}

// ── LOAD PROPERTIES ──
async function loadProperties() {
  const { data } = await db
    .from('properties')
    .select('*')
    .eq('agent_id', currentUser.id);

  properties = data || [];

  document.getElementById('prop-list').innerHTML =
    properties.map(p => `
      <div>
        ${p.bhk || ''} - ${p.location} - ₹${p.price}L
      </div>
    `).join('');
}

// ── AI INTENT EXTRACTOR (DYNAMIC) ──
async function extractIntentAI(text) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: `
Extract real estate intent. Return JSON only.

{
 "property_type": "flat | villa | plot | shop | office | unknown",
 "bhk": number | null,
 "budget": number | null,
 "location": string | null
}
        `,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    return JSON.parse(data.content?.[0]?.text || "{}");

  } catch {
    return {};
  }
}

// ── FILTER ──
function filterProperties(intent) {

  let filtered = [...properties];

  if (intent.property_type && intent.property_type !== 'unknown') {
    filtered = filtered.filter(p =>
      (p.details || '').toLowerCase().includes(intent.property_type)
    );
  }

  if (intent.bhk) {
    filtered = filtered.filter(p =>
      (p.bhk || '').includes(intent.bhk.toString())
    );
  }

  if (intent.budget) {
    filtered = filtered.filter(p =>
      p.price && p.price <= intent.budget + 15
    );
  }

  if (intent.location) {
    filtered = filtered.filter(p =>
      (p.location + " " + p.city)
        .toLowerCase()
        .includes(intent.location.toLowerCase())
    );
  }

  if (!filtered.length) {
    filtered = properties.slice(0, 3);
  }

  return filtered.slice(0, 5);
}

// ── BUILD PROMPT ──
function buildPrompt(list) {

  const txt = list.map(p => `
${p.bhk} in ${p.location}
₹${p.price}L
${p.description || ''}
`).join('\n');

  return `
You are a real estate agent.
Short replies. Suggest best option.

Properties:
${txt}
`;
}

// ── CHAT UI ──
function addMsg(role, text) {
  const c = document.getElementById('chat');
  c.innerHTML += `<div><b>${role}:</b> ${text}</div>`;
  c.scrollTop = c.scrollHeight;
}

// ── SEND MESSAGE ──
async function sendMsg() {

  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';

  addMsg("User", text);

  // 🔥 INTELLIGENCE FLOW
  const intent = await extractIntentAI(text);
  const matched = filterProperties(intent);
  const prompt = buildPrompt(matched);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system: prompt,
        messages:[{ role:'user', content:text }]
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || "Tell me more.";

    addMsg("AI", reply);

  } catch {
    addMsg("AI", "Error. Try again.");
  }
}

</script>
</body>
</html>
