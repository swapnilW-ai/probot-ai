<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropBot AI — Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --black:#111;
  --green:#22c55e;
  --border:#e5e7eb;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}
.logo{font-size:18px;font-weight:700;margin-bottom:20px}
.nav-item{
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}
.nav-item:hover{background:#222}

/* MAIN */
.main{
  flex:1;
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
  overflow:auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{font-size:22px;font-weight:600}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  border:1px solid var(--border);
}
.stat{font-size:24px;font-weight:700}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:20px;
}

/* LEADS */
.leads{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  max-height:420px;
  overflow:auto;
}
.lead{
  padding:10px;
  border-bottom:1px solid var(--border);
}

/* CHAT */
.chat{
  background:var(--card);
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.chat-box{
  flex:1;
  padding:10px;
  overflow:auto;
}
.msg{margin:6px 0}
.user{text-align:right}
.ai{text-align:left}

.chat-input{
  display:flex;
  border-top:1px solid var(--border);
}
.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}
.chat-input button{
  width:80px;
  background:var(--green);
  color:#fff;
  border:none;
  cursor:pointer;
}

/* loader */
.spin{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="logo">PropBot AI</div>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item" onclick="location.href='/properties'">Properties</div>
    <div class="nav-item" onclick="logout()">Logout</div>
  </div>
  <div id="agent"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
  <div class="title">Welcome back 👋</div>
</div>

<div class="stats">
  <div class="card"><div>Total Leads</div><div class="stat" id="total">0</div></div>
  <div class="card"><div>Hot Leads</div><div class="stat" id="hot">0</div></div>
  <div class="card"><div>Today</div><div class="stat" id="today">0</div></div>
  <div class="card"><div>Properties</div><div class="stat" id="propCount">0</div></div>
</div>

<div class="grid">

<!-- LEADS -->
<div class="leads" id="leads"></div>

<!-- CHAT -->
<div class="chat">
  <div class="chat-box" id="chat"></div>
  <div class="chat-input">
    <input id="msg" placeholder="Type buyer message..." />
    <button onclick="sendMsg()" id="btn">Send</button>
  </div>
</div>

</div>
</div>

<script>
// ───────── SUPABASE ─────────
const db = supabase.createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let user;

// ───────── INIT ─────────
(async ()=>{
  const { data:{session} } = await db.auth.getSession();

  if(!session){
    location.href="/portal";
    return;
  }

  user = session.user;

  document.getElementById("agent").innerText = user.email;

  loadLeads();
  loadPropertiesCount();
})();

// ───────── LOGOUT ─────────
async function logout(){
  await db.auth.signOut();
  location.href="/";
}

// ───────── LOAD LEADS ─────────
async function loadLeads(){
  const { data } = await db
    .from("leads")
    .select("*")
    .eq("agent_id", user.id)
    .order("created_at",{ascending:false});

  document.getElementById("leads").innerHTML = data.map(l=>`
    <div class="lead">
      ${l.name || 'Buyer'} • ${l.bhk || '?'} • ₹${l.budget_max || '?'} • ${l.location || ''}
    </div>
  `).join("");

  document.getElementById("total").innerText = data.length;
  document.getElementById("hot").innerText = data.filter(l=>l.score==="hot").length;
  document.getElementById("today").innerText = data.length;
}

// ───────── LOAD PROPERTY COUNT ─────────
async function loadPropertiesCount(){
  const { data } = await db
    .from("properties")
    .select("*")
    .eq("agent_id", user.id);

  document.getElementById("propCount").innerText = data.length;
}

// ───────── INTENT EXTRACTOR (DYNAMIC) ─────────
function extractIntent(text){
  text = text.toLowerCase();

  let bhk=null;
  if(text.includes("1")) bhk="1BHK";
  if(text.includes("2")) bhk="2BHK";
  if(text.includes("3")) bhk="3BHK";
  if(text.includes("villa")) bhk="Villa";
  if(text.includes("plot")) bhk="Plot";

  let nums=text.match(/\d+/g);
  let budget=nums?Math.max(...nums.map(Number)):null;

  let location=null;
  const areas=["nashik","pune","mumbai","gangapur","ambad","satpur"];
  areas.forEach(a=>{
    if(text.includes(a)) location=a;
  });

  return {bhk,budget_max:budget,location};
}

// ───────── PROPERTY FILTER ─────────
async function getProps(f){
  let q=db.from("properties").select("*").eq("agent_id",user.id);

  if(f.bhk) q=q.eq("bhk",f.bhk);
  if(f.budget_max) q=q.lte("price",f.budget_max);
  if(f.location) q=q.ilike("location",`%${f.location}%`);

  const { data }=await q.limit(5);
  return data||[];
}

// ───────── AI RESPONSE ─────────
function generateReply(props){
  if(!props.length){
    return "No matching property 😕 Try changing budget or location.";
  }

  return props.map(p=>`
🏠 ${p.bhk} in ${p.location}
💰 ₹${p.price}L
✨ ${p.amenities || 'Good property'}
`).join("\n\n") + "\n👉 Want site visit?";
}

// ───────── CHAT UI ─────────
function addMsg(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.innerText=text;
  const chat=document.getElementById("chat");
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// ───────── SEND MESSAGE ─────────
async function sendMsg(){
  const input=document.getElementById("msg");
  const btn=document.getElementById("btn");

  const text=input.value.trim();
  if(!text)return;

  addMsg(text,"user");
  input.value="";

  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div>';

  const intent=extractIntent(text);
  const props=await getProps(intent);
  const reply=generateReply(props);

  setTimeout(()=>addMsg(reply,"ai"),500);

  await db.from("leads").insert([{
    agent_id:user.id,
    name:"Buyer",
    bhk:intent.bhk,
    budget_max:intent.budget_max,
    location:intent.location,
    score:"warm"
  }]);

  loadLeads();

  btn.disabled=false;
  btn.innerHTML="Send";
}
</script>

</body>
</html>
