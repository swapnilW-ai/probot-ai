<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; display:flex; }
.sidebar { width:200px; background:#111; color:#fff; padding:15px; }
.main { flex:1; padding:20px; }
button { padding:8px 12px; cursor:pointer; }
.chat { border:1px solid #ddd; padding:10px; height:300px; overflow:auto; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Agent</h3>
  <div id="agent-name">...</div>
  <br>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <h2>Dashboard</h2>

  <h3>Properties</h3>
  <div id="prop-list"></div>

  <h3>AI Chat</h3>
  <div class="chat" id="chat"></div>
  <input id="msg" placeholder="Type..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>

// ── SUPABASE ──
const { createClient } = supabase;
const db = createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let currentUser = null;
let properties = [];

// ── INIT ──
(async () => {

  const { data: { session } } = await db.auth.getSession();

  if (!session) {
    window.location.href = "/agent-portal.html";
    return;
  }

  currentUser = session.user;

  // load profile
  const { data: profile } = await db
    .from('agents')
    .select('*')
    .eq('id', currentUser.id)
    .single();

  document.getElementById('agent-name').innerText =
    profile?.name || "Agent";

  await loadProperties();

})();

// ── LOGOUT ──
async function logout() {
  await db.auth.signOut();
  window.location.href = "/";
}

// ── LOAD PROPERTIES ──
async function loadProperties() {
  const { data } = await db
    .from('properties')
    .select('*')
    .eq('agent_id', currentUser.id);

  properties = data || [];

  document.getElementById('prop-list').innerHTML =
    properties.map(p => `
      <div>
        ${p.bhk || ''} - ${p.location} - ₹${p.price}L
      </div>
    `).join('');
}

// ── AI INTENT EXTRACTOR (DYNAMIC) ──
async function extractIntentAI(text) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: `
Extract real estate intent. Return JSON only.

{
 "property_type": "flat | villa | plot | shop | office | unknown",
 "bhk": number | null,
 "budget": number | null,
 "location": string | null
}
        `,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    return JSON.parse(data.content?.[0]?.text || "{}");

  } catch {
    return {};
  }
}

// ── FILTER ──
function filterProperties(intent) {

  let filtered = [...properties];

  if (intent.property_type && intent.property_type !== 'unknown') {
    filtered = filtered.filter(p =>
      (p.details || '').toLowerCase().includes(intent.property_type)
    );
  }

  if (intent.bhk) {
    filtered = filtered.filter(p =>
      (p.bhk || '').includes(intent.bhk.toString())
    );
  }

  if (intent.budget) {
    filtered = filtered.filter(p =>
      p.price && p.price <= intent.budget + 15
    );
  }

  if (intent.location) {
    filtered = filtered.filter(p =>
      (p.location + " " + p.city)
        .toLowerCase()
        .includes(intent.location.toLowerCase())
    );
  }

  if (!filtered.length) {
    filtered = properties.slice(0, 3);
  }

  return filtered.slice(0, 5);
}

// ── BUILD PROMPT ──
function buildPrompt(list) {

  const txt = list.map(p => `
${p.bhk} in ${p.location}
₹${p.price}L
${p.description || ''}
`).join('\n');

  return `
You are a real estate agent.
Short replies. Suggest best option.

Properties:
${txt}
`;
}

// ── CHAT UI ──
function addMsg(role, text) {
  const c = document.getElementById('chat');
  c.innerHTML += `<div><b>${role}:</b> ${text}</div>`;
  c.scrollTop = c.scrollHeight;
}

// ── SEND MESSAGE ──
async function sendMsg() {

  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';

  addMsg("User", text);

  // 🔥 INTELLIGENCE FLOW
  const intent = await extractIntentAI(text);
  const matched = filterProperties(intent);
  const prompt = buildPrompt(matched);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system: prompt,
        messages:[{ role:'user', content:text }]
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || "Tell me more.";

    addMsg("AI", reply);

  } catch {
    addMsg("AI", "Error. Try again.");
  }
}

</script>
</body>
</html>
