<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropBot AI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#f6f7fb}

/* AUTH */
#auth-screen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.auth-box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
}

.auth-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
}

.auth-box button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  color:#fff;
  cursor:pointer;
}

/* DASHBOARD */
#app{display:none;height:100vh}

.container{
  display:flex;
  height:100%;
}

.sidebar{
  width:220px;
  background:#111;
  color:#fff;
  padding:20px;
}

.nav div{padding:10px;cursor:pointer}

.main{
  flex:1;
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.leads,.chat{
  background:#fff;
  padding:15px;
  border-radius:10px;
  height:400px;
  overflow:auto;
}

.msg{margin:5px 0}
.user{text-align:right}
</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">
  <div class="container">

    <div class="sidebar">
      <h3>PropBot</h3>
      <div class="nav">
        <div>Dashboard</div>
        <div onclick="location.href='/properties'">Properties</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>

    <div class="main">

      <h2>Dashboard</h2>

      <div class="stats">
        <div class="card">Leads <h3 id="total">0</h3></div>
        <div class="card">Hot <h3 id="hot">0</h3></div>
        <div class="card">Today <h3 id="today">0</h3></div>
        <div class="card">Props <h3 id="props">0</h3></div>
      </div>

      <div class="grid">
        <div class="leads" id="leads"></div>

        <div class="chat">
          <div id="chat"></div>
          <input id="msg" placeholder="Message">
          <button onclick="sendMsg()">Send</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
const db = supabase.createClient(
  'https://zejcequtmrmetogbxudz.supabase.co',
  'sb_publishable_MDKa6Y4VCUoVA_UeBdaQ8w_93qDws5E'
);

let user;

// INIT
(async ()=>{
  const { data:{session} } = await db.auth.getSession();

  if(session){
    user=session.user;
    showApp();
  }else{
    showAuth();
  }
})();

// AUTH UI SWITCH
function showAuth(){
  document.getElementById("auth-screen").style.display="flex";
  document.getElementById("app").style.display="none";
}
function showApp(){
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("app").style.display="block";
  loadData();
}

// LOGIN
async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { data,error } = await db.auth.signInWithPassword({email,password});
  if(error) return alert(error.message);

  user=data.user;
  showApp();
}

// SIGNUP
async function signup(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await db.auth.signUp({email,password});
  if(error) return alert(error.message);

  alert("Check email to confirm");
}

// LOGOUT
async function logout(){
  await db.auth.signOut();
  showAuth();
}

// LOAD DATA
async function loadData(){
  loadLeads();
  loadProps();
}

async function loadLeads(){
  const { data } = await db.from("leads").select("*").eq("agent_id",user.id);

  document.getElementById("leads").innerHTML =
    data.map(l=>`<div>${l.name||"Buyer"} - ₹${l.budget_max||""}</div>`).join("");

  document.getElementById("total").innerText=data.length;
  document.getElementById("hot").innerText=data.filter(l=>l.score==="hot").length;
  document.getElementById("today").innerText=data.length;
}

async function loadProps(){
  const { data } = await db.from("properties").select("*").eq("agent_id",user.id);
  document.getElementById("props").innerText=data.length;
}

// AI
function extractIntent(t){
  t=t.toLowerCase();
  return {
    bhk: t.includes("2")?"2BHK":null,
    budget_max: t.match(/\d+/)?.[0],
    location: t.includes("nashik")?"nashik":null
  }
}

async function getProps(f){
  let q=db.from("properties").select("*").eq("agent_id",user.id);
  if(f.bhk) q=q.eq("bhk",f.bhk);
  if(f.budget_max) q=q.lte("price",f.budget_max);
  if(f.location) q=q.ilike("location",`%${f.location}%`);
  const { data }=await q.limit(3);
  return data||[];
}

function addMsg(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.innerText=t;
  document.getElementById("chat").appendChild(d);
}

// SEND
async function sendMsg(){
  const text=document.getElementById("msg").value;
  if(!text)return;

  addMsg(text,"user");

  const intent=extractIntent(text);
  const props=await getProps(intent);

  let reply="No match";
  if(props.length){
    reply=props.map(p=>`${p.bhk} ₹${p.price}`).join("\n");
  }

  setTimeout(()=>addMsg(reply,"ai"),400);

  await db.from("leads").insert([{
    agent_id:user.id,
    bhk:intent.bhk,
    budget_max:intent.budget_max
  }]);

  loadLeads();
}
</script>

</body>
</html>
