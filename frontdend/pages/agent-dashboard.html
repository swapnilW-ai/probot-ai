<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agent Dashboard</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="/frontend/styles/dashboard.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">AI Agent</div>

    <div class="nav-item">Dashboard</div>
    <div class="nav-item" onclick="logout()">Logout</div>
  </div>

  <div id="agent"></div>
</div>


<div class="main">

  <div class="top">
    <div class="title">Dashboard</div>
  </div>

  <div class="stats">
    <div class="card"><div>Total Leads</div><div class="stat" id="total">0</div></div>
    <div class="card"><div>Hot Leads</div><div class="stat" id="hot">0</div></div>
    <div class="card"><div>Today</div><div class="stat" id="today">0</div></div>
  </div>

  <div class="grid">

    <!-- Leads -->
    <div class="leads" id="leads"></div>

    <!-- Chat -->
    <div class="chat">
      <div class="chat-box" id="chat"></div>

      <div class="chat-input">
        <input id="msg" placeholder="Type message..." />
        <button onclick="sendMsg()" id="btn">Send</button>
      </div>
    </div>

  </div>

</div>


<!-- CORE -->
<script src="/frontend/js/app.js"></script>

<!-- PAGE LOGIC -->
<script src="/frontend/js/dashboard.js"></script>

</body>
</html>
